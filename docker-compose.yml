services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: appifylab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - appifylab-db:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/appifylab
      FRONTEND_URL: http://localhost:3000
      ACCESS_TOKEN_SECRET: replace_with_a_long_random_secret_access_token
      REFRESH_TOKEN_SECRET: replace_with_a_long_random_secret_refresh_token
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: appifylab
      MAX_AUTH_REQUESTS_PER_WINDOW: 10
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
    depends_on:
      - db
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  appifylab-db: